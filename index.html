<script>
const STUDENTS=["Rocket","Cici","Joe","Cassie","Rachel","Bobo","Hannah","Leon","Sylvia","Gorman","Ryan","Aaron","Annie","Yuki","Linna","Helen","Ken","Charlie","Via","Eva","Zoey"],COLORS=["#ff6b6b","#4dabf7","#51cf66","#fcc419","#845ef7","#ff922b","#20c997","#f06595","#748ffc","#94d82d","#e8590c","#15aabf"],INFO={island:{icon:"🗺️",title:"神秘岛探险",sub:"揭开迷雾，收集地图碎片"},robot:{icon:"🤖",title:"机器人组装工厂",sub:"找零件、充能、完成升级"},castle:{icon:"🏰",title:"城堡建造师",sub:"收集材料，把营地建成城堡"}},PARTS={head:["🧠","智慧头部",2],arms:["🦾","机械手臂",1],legs:["🦿","动力双腿",1],core:["💠","中央芯片",3],shield:["🛡️","防护装甲",2]},ROBOT_STAGE_POINTS=[2,3,5],LEVELS=[{icon:"⛺",name:"探险营地"},{icon:"🏠",name:"森林木屋",cost:{wood:2,stone:1,crystal:0}},{icon:"🏡",name:"石墙庄园",cost:{wood:3,stone:3,crystal:0}},{icon:"🏰",name:"勇者城堡",cost:{wood:4,stone:4,crystal:1}},{icon:"✨🏰",name:"星光王国",cost:{wood:5,stone:5,crystal:2}}];
const RULES={island:["选择一块还没有打开的迷雾。","揭晓后立即获得分数，并自动轮到下一位小朋友。","地图碎片和钥匙会记录在当前小朋友名下。","全部探索完后，点击“刷新岛屿”开始新一轮。"],robot:["打开神秘零件箱，领取零件时立即计分：头部2分、手臂1分、双腿1分、中央芯片3分、装甲2分。","能量电池得1分；重复零件会变成1格升级能量，同时得1分。","也可以选择“补充升级能量”，但充能本身不计分。","零件和升级能量达到要求后点击“升级机器人”：前两次升级分别得2分、3分。","组装成完整的终极机器人时额外得5分。每次有效行动后自动换人，老师也可以手动切换。"],castle:["每回合选择收集木材、石头或水晶。","材料足够时，点击建造按钮升级城堡；建造成功才会得分。","城堡会依次升级：营地、木屋、庄园、城堡、星光王国。","每次有效行动后自动换人；材料不够时不会扣分。"]};
let selected=[],players=[],started=false,mode="island",soundOn=true,island=[],crates=[],turn={island:0,robot:0,castle:0},toasts={island:"先选择小朋友，再开始探险吧！",robot:"先选择小朋友，再开始组装吧！",castle:"先选择小朋友，再开始建造吧！"},logs={island:["等待游戏开始…"],robot:["等待游戏开始…"],castle:["等待游戏开始…"]},audioCtx=null;const $=id=>document.getElementById(id);function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}function rollPoints(){const r=Math.random();return r<.34?1:r<.66?2:r<.88?3:r<.97?4:5}function makeIsland(){return shuffle(["shell","shell","shell","shell","coin","coin","coin","gem","gem","map","map","key"]).map((reward,id)=>({id,reward,points:rollPoints(),open:false}))}function makeCrates(){return shuffle([...Object.keys(PARTS),"energy","energy","energy"]).map((reward,id)=>({id,reward,open:false}))}function newPlayer(name,i){return{name,color:COLORS[i%COLORS.length],scores:{island:0,robot:0,castle:0},island:{fragments:0,keys:0,explored:0},robot:{parts:[],energy:0,stage:0},castle:{wood:0,stone:0,crystal:0,stage:0}}}function current(){return players[turn[mode]]}function score(p){return p.scores[mode]}function tone(kind="move"){if(!soundOn)return;try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=kind==="rare"?760:kind==="good"?580:390;g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.07,audioCtx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.15);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.17)}catch(e){}}function announce(msg,kind="move"){toasts[mode]=msg;logs[mode]=[msg,...logs[mode]].slice(0,8);tone(kind)}function guard(){if(!started||!current()){announce("请先选择小朋友并点击“开始新局”");render();return false}return true}function nextPlayer(manual=false){if(!guard())return;turn[mode]=(turn[mode]+1)%players.length;if(manual)announce("老师手动切换：轮到 "+current().name);render()}function finish(msg,update,kind="good"){const p=current();if(!p)return;if(update)update(p);announce(p.name+"："+msg,kind);turn[mode]=(turn[mode]+1)%players.length;render()}
function toggleStudent(n){if(started)return;selected=selected.includes(n)?selected.filter(x=>x!==n):[...selected,n];render()}function startGame(){if(!selected.length){toasts[mode]="请先选择至少一位小朋友";render();return}const ordered=STUDENTS.filter(n=>selected.includes(n));players=ordered.map(newPlayer);turn={island:0,robot:0,castle:0};started=true;island=makeIsland();crates=makeCrates();Object.keys(INFO).forEach(k=>{toasts[k]=ordered[0]+" 先开始，选择一个行动吧！";logs[k]=[INFO[k].title+"开始，轮到 "+ordered[0]]});tone("good");render()}function reselect(){selected=[];players=[];started=false;turn={island:0,robot:0,castle:0};island=makeIsland();crates=makeCrates();toasts={island:"先选择小朋友，再开始探险吧！",robot:"先选择小朋友，再开始组装吧！",castle:"先选择小朋友，再开始建造吧！"};logs={island:["等待游戏开始…"],robot:["等待游戏开始…"],castle:["等待游戏开始…"]};$("modal").innerHTML="";render()}function restartCurrent(){if(!guard())return;players.forEach(p=>{p.scores[mode]=0;if(mode==="island")p.island={fragments:0,keys:0,explored:0};if(mode==="robot")p.robot={parts:[],energy:0,stage:0};if(mode==="castle")p.castle={wood:0,stone:0,crystal:0,stage:0}});if(mode==="island")island=makeIsland();if(mode==="robot")crates=makeCrates();turn[mode]=0;logs[mode]=[INFO[mode].title+"已重新开始"];toasts[mode]="分数和进度已清零，轮到 "+current().name;tone("good");render()}function setMode(m){mode=m;render()}function selectPlayer(i){if(started){turn[mode]=i;announce("老师指定：轮到 "+current().name);render()}}
function explore(id){if(!guard())return;const t=island.find(x=>x.id===id);if(!t||t.open)return;t.open=true;const label={shell:"发现漂亮贝壳",coin:"找到金币",gem:"发现稀有宝石",map:"找到地图碎片",key:"找到古堡钥匙"}[t.reward],rare=t.points>=4;finish(label+" +"+t.points,p=>{p.scores.island+=t.points;p.island.fragments+=t.reward==="map"?1:0;p.island.keys+=t.reward==="key"?1:0;p.island.explored++},rare?"rare":"good")}function refreshIsland(){if(!guard())return;island=makeIsland();announce("岛屿已经刷新，新的迷雾出现了");render()}function openCrate(id){if(!guard())return;const b=crates.find(x=>x.id===id);if(!b||b.open)return;b.open=true;if(b.reward==="energy"){b.points=1;finish("找到能量电池 +1分",p=>{p.robot.energy++;p.scores.robot++});return}const p=current(),label=PARTS[b.reward][1],pts=PARTS[b.reward][2];if(p.robot.parts.includes(b.reward)){b.points=1;finish("重复的"+label+"转成1格升级能量 +1分",x=>{x.robot.energy++;x.scores.robot++})}else{b.points=pts;finish("获得"+label+" +"+pts+"分",x=>{x.robot.parts.push(b.reward);x.scores.robot+=pts},pts>=3?"rare":"good")}}function refreshCrates(){if(!guard())return;crates=makeCrates();announce("新一批神秘零件箱送到了");render()}function charge(){if(!guard())return;const a=Math.random()<.22?2:1;finish("补充升级能量 +"+a+"格",p=>p.robot.energy+=a,a===2?"rare":"good")}function upgradeRobot(){if(!guard())return;const p=current(),needs=[{parts:2,energy:1},{parts:4,energy:2},{parts:5,energy:3}],n=needs[p.robot.stage];if(!n){announce(p.name+" 的终极机器人已经完成！");render();return}if(p.robot.parts.length<n.parts||p.robot.energy<n.energy){announce("还需要 "+n.parts+" 种零件和 "+n.energy+" 格升级能量才能升级");render();return}const next=p.robot.stage+1,pts=ROBOT_STAGE_POINTS[p.robot.stage],complete=next===3;finish((complete?"完整机器人组装成功":"机器人升级到第"+next+"阶段")+" +"+pts+"分",p=>{p.scores.robot+=pts;p.robot.stage=next;p.robot.energy-=n.energy},complete?"rare":"good")}function gather(r){if(!guard())return;const rare=Math.random()<(r==="crystal"?.14:.28),a=rare?2:1,label={wood:"木材",stone:"石头",crystal:"水晶"}[r];finish("收集"+label+" +"+a+"份",p=>p.castle[r]+=a,rare?"rare":"good")}function buildCastle(){if(!guard())return;const p=current(),lv=LEVELS[p.castle.stage+1];if(!lv){announce(p.name+" 的星光王国已经建成！");render();return}const c=lv.cost;if(p.castle.wood<c.wood||p.castle.stone<c.stone||p.castle.crystal<c.crystal){announce("建造“"+lv.name+"”需要：木"+c.wood+" / 石"+c.stone+" / 晶"+c.crystal);render();return}const pts=rollPoints();finish("建成"+lv.name+" +"+pts,p=>{p.scores.castle+=pts;p.castle.wood-=c.wood;p.castle.stone-=c.stone;p.castle.crystal-=c.crystal;p.castle.stage++},pts>=4?"rare":"good")}
function progressValue(p){return mode==="island"?p.island.fragments+p.island.keys:mode==="robot"?p.robot.stage*3+p.robot.parts.length:p.castle.stage*3}function showRules(){$("modal").innerHTML='<div class="overlay"><div class="modal"><button class="close" onclick="closeResults()">×</button><div class="trophy">'+INFO[mode].icon+'</div><p class="eyebrow">HOW TO PLAY</p><h2>'+INFO[mode].title+'规则</h2><div style="text-align:left;margin:18px 0;display:grid;gap:9px">'+RULES[mode].map((r,i)=>'<div style="display:grid;grid-template-columns:28px 1fr;gap:9px;align-items:start;background:#f3f6f7;padding:11px;border-radius:13px"><strong style="width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:#ffc83d">'+(i+1)+'</strong><span style="line-height:1.55;font-weight:800">'+r+'</span></div>').join('')+'</div><div class="note" style="background:#eef9f6;padding:12px;border-radius:12px">三款游戏独立计分；“重开当前游戏”只会清零现在这一款。</div><button class="btn coral wide" style="margin-top:14px" onclick="closeResults()">知道了，开始玩</button></div></div>'}function showResults(){if(!started)return;const rank=[...players].sort((a,b)=>score(b)-score(a)||progressValue(b)-progressValue(a));$("modal").innerHTML='<div class="overlay"><div class="modal"><button class="close" onclick="closeResults()">×</button><div class="trophy">🏆</div><p>'+INFO[mode].title+' · FINAL</p><h2>'+rank[0].name+' 获胜！</h2><p class="note">这里只结算当前游戏。</p><div class="ranking">'+rank.map((p,i)=>'<div class="rank '+(i===0?'win':'')+'"><strong>'+(i+1)+'</strong><span class="avatar" style="--pc:'+p.color+'">'+p.name[0]+'</span><b>'+p.name+'</b><strong>'+score(p)+' 分</strong></div>').join('')+'</div><button class="btn coral wide" onclick="closeResults()">继续玩</button></div></div>'}function closeResults(){$("modal").innerHTML=""}
function renderModes(){$("modes").innerHTML=Object.entries(INFO).map(([k,v])=>'<button class="mode '+(mode===k?'active':'')+'" onclick="setMode(\''+k+'\')"><span>'+v.icon+'</span><strong>'+v.title+'</strong><small>'+v.sub+'</small></button>').join('')}function renderScores(){if(!players.length){$("scores").innerHTML='<p class="score-empty">选择学生并开始后，这里显示当前游戏的独立分数。</p>';return}$("scores").innerHTML='<span class="score-note">'+INFO[mode].icon+' '+INFO[mode].title+'</span>'+players.map((p,i)=>'<button class="chip '+(i===turn[mode]?'current':'')+'" style="--pc:'+p.color+'" onclick="selectPlayer('+i+')"><span class="avatar">'+p.name[0]+'</span><span><b>'+p.name+'</b><small>'+score(p)+' 分</small></span>'+(i===turn[mode]?'<em class="now">现在</em>':'')+'</button>').join('')+'<button class="settle" onclick="showResults()">🏆 一键结算</button>'}function renderStudents(){$("count").textContent=selected.length+'人';$("students").innerHTML=STUDENTS.map(n=>'<button class="student '+(selected.includes(n)?'on':'')+'" '+(started?'disabled':'')+' onclick="toggleStudent(\''+n+'\')"><i>'+(selected.includes(n)?'✓':n[0])+'</i>'+n+'</button>').join('');$("startArea").innerHTML=!started?'<button class="btn coral wide" onclick="startGame()">开始新局</button>':'<div class="turn" style="--pc:'+current().color+'"><small>'+INFO[mode].title+'现在轮到</small><strong>'+current().name+'</strong><p>完成一次有效行动后自动换人</p></div>'}
function renderIsland(){const v={shell:"🐚",coin:"🪙",gem:"💎",map:"🗺️",key:"🗝️"},p=current(),done=island.every(x=>x.open);return '<div class="island-layout"><div class="island-map"><div class="island"><span class="deco palm">🌴</span><span class="deco mountain">⛰️</span><span class="deco ruin">🏛️</span><div class="tiles">'+island.map(t=>'<button class="tile '+(t.open?'open '+(t.points>=4?'rare':''):'')+'" '+(t.open?'disabled':'')+' onclick="explore('+t.id+')">'+(t.open?'<span>'+v[t.reward]+'</span><small>+'+t.points+'</small>':'<span>☁️</span><small>探索</small>')+'</button>').join('')+'</div></div></div><div class="instructions"><span class="step">01</span><h3>选择一块迷雾</h3><p>点击一块还没有打开的迷雾，看看里面藏着什么。</p><div class="mini"><span>🧩 '+(p?p.island.fragments:0)+' 碎片</span><span>🗝️ '+(p?p.island.keys:0)+' 钥匙</span></div>'+(done?'<div class="round-done">🎉 本轮探索完成！<br>刷新后可继续下一轮</div>':'')+'<button class="btn yellow wide" onclick="refreshIsland()">🔄 刷新岛屿</button></div></div>'}function renderRobot(){const p=current()||newPlayer("?",0);return '<div class="robot-layout"><div class="factory"><div class="robot s'+p.robot.stage+'">🤖</div><div class="meter"><i style="width:'+Math.min(100,p.robot.energy*22)+'%"></i></div><p>阶段 '+p.robot.stage+' / 3 · 升级能量 '+p.robot.energy+'</p></div><div class="controls"><span class="step">02</span><h3>打开神秘零件箱</h3><p>找到零件立即得分，组装成完整机器人再奖励5分。</p><div class="crates">'+crates.map(b=>'<button class="crate '+(b.open?'open':'')+'" '+(b.open?'disabled':'')+' onclick="openCrate('+b.id+')">'+(b.open?'<span>'+(b.reward==="energy"?'🔋':PARTS[b.reward][0])+'</span><small>+ '+b.points+'分</small>':'?')+'</button>').join('')+'</div><div class="inventory">'+Object.entries(PARTS).map(([k,v])=>'<span class="part '+(p.robot.parts.includes(k)?'owned':'')+'">'+v[0]+'<small>'+v[1]+' · '+v[2]+'分</small></span>').join('')+'</div><div class="dual"><button class="btn soft" onclick="charge()">⚡ 补充升级能量</button><button class="btn coral" onclick="upgradeRobot()">⬆ 升级机器人</button></div><button class="btn yellow wide" style="margin-top:9px" onclick="refreshCrates()">🔄 换一批零件箱</button></div></div>'}function renderCastle(){const p=current()||newPlayer("?",0),lv=LEVELS[p.castle.stage],next=LEVELS[p.castle.stage+1];return '<div class="castle-layout"><div class="scene"><span class="sun">☀️</span><span class="cloud c1">☁️</span><span class="cloud c2">☁️</span><div class="building"><span>'+lv.icon+'</span><strong>'+lv.name+'</strong></div></div><div class="controls"><span class="step">03</span><h3>收集材料，建造升级</h3><p>选择材料进行收集，数量足够后就可以升级城堡。</p><div class="mini"><span>🪵 '+p.castle.wood+'</span><span>🪨 '+p.castle.stone+'</span><span>💎 '+p.castle.crystal+'</span></div><div class="resources"><button class="res" onclick="gather(\'wood\')"><span>🪵</span><b>收集木材</b><small>常见材料</small></button><button class="res" onclick="gather(\'stone\')"><span>🪨</span><b>收集石头</b><small>常见材料</small></button><button class="res" onclick="gather(\'crystal\')"><span>💎</span><b>寻找水晶</b><small>稀有材料</small></button></div><button class="btn coral wide" style="margin-top:10px" onclick="buildCastle()">'+(next?'建造 '+next.name+'<br><small>木'+next.cost.wood+' / 石'+next.cost.stone+' / 晶'+next.cost.crystal+'</small>':'星光王国已经完成 ✨')+'</button></div></div>'}
function renderProgress(){const p=current();if(!p){$("progress").innerHTML="";return}const rows=mode==="island"?[["地图碎片",p.island.fragments],["古堡钥匙",p.island.keys],["已探索",p.island.explored+'格']]:mode==="robot"?[["机器人阶段",p.robot.stage+'/3'],["已获零件",p.robot.parts.length+'/5'],["升级能量",p.robot.energy]]:[["城堡阶段",p.castle.stage+'/4'],["木材",p.castle.wood],["石头 / 水晶",p.castle.stone+' / '+p.castle.crystal]];$("progress").innerHTML='<div class="progress" style="--pc:'+p.color+'"><div class="phead"><span class="avatar" style="--pc:'+p.color+'">'+p.name[0]+'</span><div><small>当前玩家</small><b>'+p.name+'</b></div><b>'+score(p)+' 分</b></div><section>'+rows.map(r=>'<p><span>'+r[0]+'</span><strong>'+r[1]+'</strong></p>').join('')+'</section></div>'}function render(){renderModes();renderScores();renderStudents();$("gameTitle").textContent=INFO[mode].icon+' '+INFO[mode].title;$("gameBody").innerHTML=mode==="island"?renderIsland():mode==="robot"?renderRobot():renderCastle();$("toast").textContent=toasts[mode];renderProgress();$("history").innerHTML=logs[mode].map((h,i)=>'<p><i>'+(i+1)+'</i>'+h+'</p>').join('');$("soundBtn").textContent=soundOn?'🔊 音效开':'🔇 音效关'}$("soundBtn").onclick=()=>{soundOn=!soundOn;render()};$("rulesBtn").onclick=showRules;$("nextTop").onclick=()=>nextPlayer(true);$("nextSide").onclick=()=>nextPlayer(true);$("restartBtn").onclick=restartCurrent;$("reselectBtn").onclick=reselect;island=makeIsland();crates=makeCrates();render();
</script></body></html>
